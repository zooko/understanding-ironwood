<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>What Ironwood does</title>
<style>
 body{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;max-width:1020px;margin:14px auto;
   padding:0 12px;color:#222;background:#fafaf8}
 h1{font-size:22px;text-align:center;margin:4px 0 10px}

 /* ---- entry question ---- */
 .qcard{max-width:520px;margin:26px auto;text-align:center}
 .qcard h2{font-size:17px;margin:0 0 10px}
 .qbtn{display:block;width:100%;margin:9px 0;padding:13px 14px;font:inherit;font-size:15px;font-weight:600;
   border-radius:12px;border:2px solid #444;background:#fff;color:#444;cursor:pointer;line-height:1.35}
 .q-funds{border-color:#9a5b15;color:#9a5b15}.q-supply{border-color:#2c5577;color:#2c5577}

 /* ---- answer bubbles ---- */
 .answer{max-width:720px;margin:12px auto 18px;background:#fff;border:2px solid #a86b00;border-radius:12px;
   padding:10px 16px 12px;position:relative;font-size:14.5px;line-height:1.55;color:#333;
   box-shadow:0 2px 10px rgba(0,0,0,.07);animation:fin .5s}
 @keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
 .answer::after{content:"";position:absolute;left:50%;bottom:-11px;transform:translateX(-50%);
   border:11px solid transparent;border-bottom:none;border-top:11px solid #a86b00}
 .answer .alab{display:block;font-size:10px;font-weight:bold;letter-spacing:1.5px;color:#a86b00;margin-bottom:4px}
 .ans-after{border-color:#1a7a3a}
 .ans-after::after{border-top-color:#1a7a3a}
 .ans-after .alab{color:#1a7a3a}
 /* "same answer" chip: visibly lighter than a full answer */
 .answer.same{border-style:dashed;background:#f5f8f5;box-shadow:none;max-width:560px;
   font-size:13.5px;padding:8px 14px 10px}
 .answer.same::after{display:none}

 /* ---- top bar: the one question ---- */
 .btns{position:sticky;top:0;z-index:9;padding:6px 0 6px;background:rgba(250,250,248,.97);
   border-bottom:1px solid #e7e7e2}
 .brow{display:flex;justify-content:center;align-items:stretch;max-width:620px;margin:2px auto;padding:0 2px}
 .btns button{font:inherit;font-size:12.5px;font-weight:600;padding:7px 4px;
   border:1.5px solid #bbb;background:#fff;color:#444;cursor:pointer;
   flex:1 1 0;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
   border-radius:0;margin-left:-1.5px}
 .brow button:first-of-type{border-radius:16px 0 0 16px;margin-left:0}
 .brow button:last-of-type{border-radius:0 16px 16px 0}
 .btns button[aria-pressed="true"]{position:relative;z-index:1}
 #l-funds{border-color:#9a5b15;color:#9a5b15}
 #l-supply{border-color:#2c5577;color:#2c5577}
 #l-funds[aria-pressed="true"]{background:#9a5b15;color:#fff}
 #l-supply[aria-pressed="true"]{background:#2c5577;color:#fff}
 #l-all[aria-pressed="true"]{background:#444;border-color:#444;color:#fff}
 .bshort{display:none}
 @media (max-width:600px){.blong{display:none}.bshort{display:inline}}
 .statusL{text-align:center;font-size:12.5px;color:#777;margin:8px auto;max-width:680px;min-height:1em}

 /* ---- grid ---- */
 .grid{display:grid;grid-template-columns:22px 1fr 1fr;gap:10px;
   transition:grid-template-columns .65s cubic-bezier(.45,0,.2,1)}
 body[data-view="clean"] .grid{grid-template-columns:22px 1fr 0fr}
 body[data-view="dirty"] .grid{grid-template-columns:22px 0fr 1fr}
 body:not([data-view="all"]) .grid{max-width:740px;margin:0 auto}
 .c-clean,.c-dirty{min-width:0;overflow:hidden;transition:opacity .4s}
 body[data-view="clean"] .c-dirty,body[data-view="dirty"] .c-clean{opacity:0;pointer-events:none}
 .rowlab{writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;font-size:11px;font-weight:bold;
   letter-spacing:2px;color:#777;background:#f1f1ee;border-radius:8px;padding:4px 1px}

 /* ---- cells: tagged colored frames carry the scenario ---- */
 .cell{background:#fff;border-radius:8px;padding:8px 8px 4px;
   box-shadow:0 1px 6px rgba(0,0,0,.05);position:relative;cursor:zoom-in;
   transition:transform .2s,box-shadow .2s}
 .cell.c-clean{border:2px solid rgba(26,122,58,.5)}
 .cell.c-dirty{border:2px solid rgba(192,57,43,.5)}
 body:not([data-view="all"]) .cell{cursor:zoom-out}
 @media (hover:hover){
  .cell:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.13)}
  .cell:hover::after{opacity:.9}
 }
 .cell::after{content:"";position:absolute;top:7px;right:7px;width:19px;height:19px;opacity:.4;
   transition:opacity .2s;background:no-repeat center/contain
   url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><circle cx="8" cy="8" r="6.2" fill="white" stroke="%23555" stroke-width="1.8"/><line x1="12.8" y1="12.8" x2="18" y2="18" stroke="%23555" stroke-width="2.4" stroke-linecap="round"/><line x1="5.2" y1="8" x2="10.8" y2="8" stroke="%23555" stroke-width="1.8"/><line x1="8" y1="5.2" x2="8" y2="10.8" stroke="%23555" stroke-width="1.8"/></svg>')}
 body:not([data-view="all"]) .cell::after{background-image:
   url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><circle cx="8" cy="8" r="6.2" fill="white" stroke="%23555" stroke-width="1.8"/><line x1="12.8" y1="12.8" x2="18" y2="18" stroke="%23555" stroke-width="2.4" stroke-linecap="round"/><line x1="5.2" y1="8" x2="10.8" y2="8" stroke="%23555" stroke-width="1.8"/></svg>')}
 .tag{display:table;font-size:10.5px;font-weight:bold;letter-spacing:.3px;
   padding:2px 10px;border-radius:9px;margin:0 auto 5px}
 .c-clean .tag{background:#eaf4ee;color:#1a5c30}
 .c-dirty .tag{background:#fbeeec;color:#8c2418}

 svg{width:100%;height:auto;display:block}
 svg text{font-family:inherit}
 text.h{paint-order:stroke;stroke:#fff;stroke-width:3.5px;stroke-linejoin:round}
 svg .d{opacity:0;transition:opacity .45s .35s}
 body[data-view="clean"] .c-clean svg .d,
 body[data-view="dirty"] .c-dirty svg .d{opacity:1}
 svg .zo,svg .zg,svg .zi,svg .zr,svg .zm{transition:opacity .45s}
 body[data-lens="funds"] svg .zr,
 body[data-lens="funds"] svg .zm,
 body[data-lens="funds"] svg .zi{opacity:.15}

 .band{grid-column:1/4;background:#1a7a3a;color:#fff;text-align:center;border-radius:8px;
   padding:8px 10px;font-size:13.5px;font-weight:bold}
 .band span{font-weight:normal;opacity:.9}
 .grid .answer{grid-column:1/4;margin-bottom:6px}
 .bigwrap{grid-column:1/4;text-align:center;padding:6px 0 2px}
 .bigbtn{font:inherit;font-size:15px;font-weight:700;color:#fff;background:#1a7a3a;border:2px solid #1a7a3a;
   border-radius:24px;padding:11px 26px;cursor:pointer;box-shadow:0 2px 8px rgba(26,122,58,.35)}
 .bigbtn:hover{background:#156332}
 .bigbtn.open{background:#fff;color:#1a7a3a;box-shadow:none}
 .foot{color:#999;font-size:12px;text-align:center;margin:22px 0 8px}

 /* ---- stage gating ---- */
 body[data-stage="step1"] .btns,body[data-stage="step1"] .statusL,
 body[data-stage="step1"] #ansToday,body[data-stage="step1"] .grid,body[data-stage="step1"] .foot{display:none}
 body[data-stage="today"] #wiz,body[data-stage="full"] #wiz{display:none}
 body[data-stage="today"] .g-bot{display:none}
 @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body data-view="all" data-lens="all" data-stage="step1">

<h1>What Ironwood does</h1>

<div id="wiz" class="qcard">
 <h2>What&rsquo;s your question?</h2>
 <button class="qbtn q-funds" onclick="setConcern('funds')">Will users get their funds back?</button>
 <button class="qbtn q-supply" onclick="setConcern('supply')">Is the 16M ZEC supply still sound?</button>
 <button class="qbtn" onclick="setConcern('both')">Both &mdash; show me everything</button>
</div>

<div class="btns"><div class="brow">
 <button id="l-funds" onclick="setConcern('funds')"><span class="blong">Will users get their funds back?</span><span class="bshort">Users&rsquo; funds</span></button>
 <button id="l-supply" onclick="setConcern('supply')"><span class="blong">Is the 16M supply sound?</span><span class="bshort">16M supply</span></button>
 <button id="l-all" onclick="setConcern('both')">Both</button>
</div></div>
<p class="statusL" id="statusL"></p>

<div class="answer" id="ansToday"><span class="alab" id="ansTodayLab"></span><span id="ansTodayTxt"></span></div>

<div class="grid" id="grid"></div>

<p class="foot">Based on the Ironwood proposal by Shielded Labs, the Zcash Foundation, Project Tachyon, Valar Group, and ZODL.</p>

<script>
const OR='#e8923a',ORD='#9a5b15',BL='#4878a8',BLD='#2c5577',GR='#1a7a3a',RD='#c0392b',GY='#999',GYD='#777',AM='#a86b00';
const B='font-weight="bold"',BH='font-weight="bold" class="h"',BD='font-weight="bold" class="d"',BDH='font-weight="bold" class="d h"';
const T=(x,y,s,f,c,e='')=>`<text x="${x}" y="${y}" text-anchor="middle" font-size="${s}" fill="${f}" ${e}>${c}</text>`;
const mk=(id,f)=>`<marker id="${id}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="${f}"/></marker>`;

const SOLID=' pathLength="100" stroke-dasharray="87 13"';
const DASHED=' pathLength="100" stroke-dasharray="5 4 5 4 5 4 5 4 5 4 5 4 5 4 5 4 5 4 6 13"';
function leftPool(p,o){
 const sl=o.sealed, dash=sl?DASHED:SOLID;
 const arc=(d,col,m)=>`<path d="${d}" fill="none" stroke="${col}" stroke-width="2.2"${dash} marker-end="url(#${m}${p})"/>`;
 let s=`<rect x="6" y="8" width="180" height="156" rx="6" fill="${sl?'#f4f4f4':'#fff7ef'}" stroke="${sl?'#999':OR}" stroke-width="1.6"/>`
  +T(96,26,11.5,sl?'#555':ORD,'Orchard pool'+(sl?' &#8212; sealed':''),B);
 if(o.split){
  s+=arc('M 54 56 A 42 16 0 0 1 138 56',sl?'#c4c4c4':ORD,sl?'x':'o')
   +arc('M 138 112 A 42 16 0 0 1 54 112',sl?'#c4c4c4':RD,sl?'x':'r')
   +`<rect x="16" y="62" width="76" height="44" rx="3" fill="${OR}"/>`
   +T(54,82,12,'#fff','4.5M',B)+T(54,97,8.5,'#fff','honest')
   +`<rect x="100" y="62" width="72" height="44" rx="3" fill="url(#h${p})" stroke="${RD}" stroke-dasharray="4,3"/>`
   +`<circle cx="136" cy="84" r="11" fill="#fff" stroke="${RD}"/>`+T(136,88,12,RD,'?',B);
  if(sl)s+=T(96,46,12,GY,'&#10007;',BH)+T(96,130,12,GY,'&#10007;',BH);
 }else{
  s+=arc('M 51 60 A 45 16 0 0 1 141 60',sl?'#c4c4c4':ORD,sl?'x':'o')
   +arc('M 141 104 A 45 16 0 0 1 51 104',sl?'#c4c4c4':ORD,sl?'x':'o')
   +T(96,90,22,OR,'4.5M',B);
  if(sl)s+=T(96,50,12,GY,'&#10007;',BH)+T(96,122,12,GY,'&#10007;',BH);
 }
 s+=T(96,146,9.5,o.capCol,o.cap,B)
  +(o.sub?T(96,159,9.5,o.subCol||'#666',o.sub,'class="d"'):'');
 return s;
}
const rightPool=(p,o)=>`<rect x="274" y="8" width="180" height="156" rx="6" fill="#eef4fa" stroke="${BL}" stroke-width="1.6"/>`
 +T(364,26,11.5,BLD,o.title,B)
 +`<path d="M 319 60 A 45 16 0 0 1 409 60" fill="none" stroke="${BL}" stroke-width="2.2"${SOLID} marker-end="url(#b${p})"/>`
 +`<path d="M 409 104 A 45 16 0 0 1 319 104" fill="none" stroke="${BL}" stroke-width="2.2"${SOLID} marker-end="url(#b${p})"/>`
 +T(364,90,22,BL,'11.5M',B)
 +T(364,146,9.5,BLD,'changing hands freely &#10003;',B)
 +(o.sub?T(364,159,9.5,BLD,o.sub,'class="d"'):'');

const gate=()=>`<rect x="224" y="8" width="12" height="156" fill="#e9f7ee" stroke="${GR}" stroke-width="1.2"/>`
 +T(230,20,8,GR,'TURNSTILE','font-weight="bold" letter-spacing="1" class="h"');
const aOut=(p,y,t)=>T(230,y-8,10,GR,t,BDH)+`<line x1="192" y1="${y}" x2="266" y2="${y}" stroke="${GR}" stroke-width="2.4" marker-end="url(#g${p})"/>`;
const aIn =(p,y)=>T(230,y-8,10,GR,'in &#10003;',BDH)+`<line x1="266" y1="${y}" x2="192" y2="${y}" stroke="${GR}" stroke-width="2.4" marker-end="url(#g${p})"/>`;
const aRed=(p,y)=>T(230,y-8,10,RD,'then: blocked',BDH)+`<line x1="192" y1="${y}" x2="216" y2="${y}" stroke="${RD}" stroke-width="2.4" marker-end="url(#r${p})"/>`+T(230,y+4,12,RD,'&#10007;',BH);
const aGrey=(p,y)=>T(230,y-8,10,GYD,'in: sealed',BDH)+`<line x1="266" y1="${y}" x2="242" y2="${y}" stroke="#c4c4c4" stroke-width="2.4" marker-end="url(#x${p})"/>`+T(230,y+4,12,GY,'&#10007;',BH);

function meter(p,m){
 let s=`<text x="30" y="186" font-size="9" fill="#777" font-weight="bold" letter-spacing="1">TOTAL ZEC THAT CAN CHANGE HANDS</text>`
  +T(330,186,9,'#333','16M cap',B)+`<line x1="330" y1="189" x2="330" y2="214" stroke="#333" stroke-width="1.6"/>`
  +`<rect x="30" y="192" width="215" height="15" fill="${BL}"/>`+T(137,203.5,9,'#fff','11.5M',B)
  +`<rect x="245" y="192" width="85" height="15" fill="${OR}"/>`+T(287,203.5,9,'#fff','4.5M',B);
 if(m.over) s+=`<rect x="330" y="192" width="62" height="15" fill="url(#h${p})" stroke="${RD}" stroke-dasharray="4,3"/>`
  +T(361,203.5,9,RD,'+ ?','font-weight="bold" class="h"')
  +`<text x="398" y="203.5" font-size="9" fill="${RD}" font-weight="bold">no limit</text>`;
 s+=T(230,236,12,m.col,m.verdict,B);
 return s;
}

function svgPanel(P){
 const p=P.n;
 const defs='<defs>'+(P.cf?`<pattern id="h${p}" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect width="7" height="7" fill="#fbecec"/><line x1="0" y1="0" x2="0" y2="7" stroke="${RD}" stroke-width="2"/></pattern>`:'')
  +mk('g'+p,GR)+mk('r'+p,RD)+mk('x'+p,'#bbb')+mk('o'+p,ORD)+mk('b'+p,BL)+'</defs>';
 return `<svg viewBox="0 0 460 248">${defs}<g class="zo">${leftPool(p,P.left)}</g><g class="zg">${gate()}${P.flow}</g><g class="zi">${P.flowIn}</g><g class="zr">${rightPool(p,P.right)}</g><g class="zm">${meter(p,P.meter)}</g></svg>`;
}

const PANELS=[
{n:1,cf:false,
 left:{cap:'ZEC changes hands inside &#10003;',capCol:ORD,sub:'all of it entered via the turnstile'},
 right:{title:'Rest of Zcash',sub:''},
 flow:aOut(1,72,'out &#8804; 4.5M &#10003;'),flowIn:aIn(1,132),
 meter:{col:AM,verdict:'&#10003; 16M &#8212; true, but not provable'}},
{n:2,cf:true,
 left:{split:true,cap:'counterfeit ZEC changes hands too',capCol:RD,sub:'invisible &amp; unbounded',subCol:RD},
 right:{title:'Rest of Zcash',sub:''},
 flow:aOut(2,72,'out: first 4.5M &#10003;')+aRed(2,106),flowIn:aIn(2,144),
 meter:{over:true,col:RD,verdict:'&#10007; 16M + ? &#8212; no limit, not verifiable'}},
{n:3,cf:false,
 left:{sealed:true,cap:'no movement inside &#8212; exit only',capCol:GYD,sub:'all 4.5M can exit &#10003;',subCol:GR},
 right:{title:'Rest of Zcash + new pool',sub:'&#8594; 16M as users migrate'},
 flow:aOut(3,72,'out &#8804; 4.5M &#10003;'),flowIn:aGrey(3,132),
 meter:{col:GR,verdict:'&#10003; &#8804; 16M &#8212; enforced, verifiable by anyone'}},
{n:4,cf:true,
 left:{sealed:true,split:true,cap:'no movement inside &#8212; exit only',capCol:GYD,sub:'exit is first come, first served',subCol:RD},
 right:{title:'Rest of Zcash + new pool',sub:'+ at most 4.5M from Orchard'},
 flow:aOut(4,72,'out: first 4.5M &#10003;')+aRed(4,106),flowIn:aGrey(4,144),
 meter:{col:GR,verdict:'&#10003; &#8804; 16M &#8212; enforced, verifiable by anyone'}}
];

const TAG={clean:'if the bug was never exploited',dirty:'if counterfeiting happened'};
const cell=(P,col,row)=>`<div class="cell ${row} c-${col}" data-col="${col}"><div class="tag">${TAG[col]}</div>${svgPanel(P)}</div>`;
document.getElementById('grid').innerHTML=
 `<div class="rowlab g-top">TODAY</div>${cell(PANELS[0],'clean','g-top')}${cell(PANELS[1],'dirty','g-top')}
  <div class="bigwrap"><button class="bigbtn" id="iwbtn" onclick="toggleIW()"></button></div>
  <div class="band g-bot" id="band">&#10503; &nbsp;IRONWOOD ACTIVATES&nbsp; &#10503; <span>&mdash; the old Orchard pool is sealed: nothing enters, nothing changes hands inside, exit only &mdash; same turnstile, same 4.5M budget</span></div>
  <div class="answer ans-after g-bot" id="ansAfter"><span class="alab" id="ansAfterLab"></span><span id="ansAfterTxt"></span></div>
  <div class="rowlab g-bot">AFTER IRONWOOD</div>${cell(PANELS[2],'clean','g-bot')}${cell(PANELS[3],'dirty','g-bot')}`;

/* ---------- answers ---------- */
const GRN='<b style="color:#1a7a3a">',RDS='<b style="color:#c0392b">';
const XR='<b style="color:#c0392b">&#10007;</b>',QR='<b style="color:#c0392b">?</b>';
const QLAB={funds:'WILL USERS GET THEIR FUNDS BACK?',supply:'IS THE 16M SUPPLY SOUND?',both:'SUPPLY &amp; FUNDS'};
/* after-answers that are objects ({txt}) mean: same answer as today — render as a compact chip */
const ANS={
today:{
 funds:{
  clean:GRN+'If the bug was never exploited</b>: <b>yes.</b> Exactly 4.5M honest ZEC is inside; the turnstile lets exactly 4.5M out. Everyone leaves whole.',
  dirty:RDS+'If counterfeiting happened</b>: <b>not guaranteed.</b> The turnstile counts amounts, not legitimacy: the first 4.5M exits, the rest is blocked. If counterfeit ZEC exits, an equal amount of honest ZEC is trapped ('+XR+').',
  all:'<b>Probably &mdash; but not necessarily.</b> '+GRN+'If the bug was never exploited</b>: everyone leaves whole. '+RDS+'If counterfeiting happened</b>: the first 4.5M exits, whoever they are &mdash; honest ZEC could be trapped ('+XR+').'},
 supply:{
  clean:GRN+'If the bug was never exploited</b>: <b>yes &mdash; but unprovable.</b> The 16M rests on the amount inside Orchard, which is private. You assume it; you can&rsquo;t check it.',
  dirty:RDS+'If counterfeiting happened</b>: <b>no &mdash; and there&rsquo;s no limit.</b> Counterfeit ZEC changing hands inside Orchard is real circulation: 16M&nbsp;+&nbsp;'+QR+'.',
  all:'<b>No one can tell.</b> '+GRN+'If the bug was never exploited</b>: 16M &mdash; true, but unprovable. '+RDS+'If counterfeiting happened</b>: 16M&nbsp;+&nbsp;'+QR+' &mdash; no limit. From outside the private pool, the two look identical.'},
 both:{
  clean:GRN+'If the bug was never exploited</b>: <b>funds safe; supply 16M.</b> Both facts rest on the amount inside the private pool &mdash; true, but not checkable.',
  dirty:RDS+'If counterfeiting happened</b>: <b>supply: no limit (16M&nbsp;+&nbsp;'+QR+'). Funds: not guaranteed</b> &mdash; the first 4.5M exits, the rest is blocked ('+XR+').',
  all:GRN+'If the bug was never exploited</b>: funds safe, supply 16M &mdash; but unprovable. '+RDS+'If counterfeiting happened</b>: supply unbounded, funds not guaranteed ('+XR+').'}},
after:{
 funds:{
  clean:{txt:'Ironwood doesn&rsquo;t change this: everyone still leaves whole.'},
  dirty:{txt:'Ironwood doesn&rsquo;t change this. The risk was created by the bug, not by Ironwood.'},
  all:{txt:'Ironwood doesn&rsquo;t change this. The risk was created by the bug, not by Ironwood.'}},
 supply:{
  clean:GRN+'If the bug was never exploited</b>: <b>yes &mdash; and now provable.</b> &#8804;&nbsp;16M is enforced by consensus rules; anyone running a node can verify it.',
  dirty:RDS+'If counterfeiting happened</b>: <b>yes &mdash; no matter how much was minted.</b> The '+QR+' can never change hands again; the only exit counts to 4.5M and stops.',
  all:'<b>Yes &mdash; either way, provably.</b> The old pool is sealed; at most 4.5M can ever exit. &#8804;&nbsp;16M, verifiable by anyone running a node.'},
 both:{
  clean:GRN+'If the bug was never exploited</b>: <b>supply: 16M, now provable. Funds: unchanged</b> &mdash; everyone leaves whole.',
  dirty:RDS+'If counterfeiting happened</b>: <b>supply: now capped, provably. Funds: unchanged</b> &mdash; not guaranteed ('+XR+'); a risk created by the bug, not by Ironwood.',
  all:'<b>Supply: &#8804;&nbsp;16M either way &mdash; now enforced and verifiable. Funds: unchanged</b> &mdash; '+RDS+'if counterfeiting happened</b>, honest ZEC could be trapped ('+XR+'); a risk created by the bug, not by Ironwood.'}}};

const STATUSL={all:'',supply:'Watch the circling arrows and the supply bar.',
 funds:'Watch the Orchard pool and its turnstile.'};

/* ---------- state ---------- */
let concern=null;
const C2L={funds:'funds',supply:'supply',both:'all'};

function renderAns(){
 if(!concern)return;
 const b=document.body.dataset.view;
 document.getElementById('ansTodayLab').innerHTML=QLAB[concern];
 document.getElementById('ansTodayTxt').innerHTML=ANS.today[concern][b];
 const aft=ANS.after[concern][b], box=document.getElementById('ansAfter');
 if(typeof aft==='object'){
  box.classList.add('same');
  document.getElementById('ansAfterLab').innerHTML=QLAB[concern]+' &nbsp;&middot;&nbsp; SAME ANSWER AS TODAY';
  document.getElementById('ansAfterTxt').innerHTML=aft.txt;
 }else{
  box.classList.remove('same');
  document.getElementById('ansAfterLab').innerHTML=QLAB[concern];
  document.getElementById('ansAfterTxt').innerHTML=aft;
 }
}
function setConcern(c){
 concern=c;
 const lens=C2L[c];
 document.body.dataset.lens=lens;
 for(const [id,k] of [['l-funds','funds'],['l-supply','supply'],['l-all','both']])
  document.getElementById(id).setAttribute('aria-pressed',String(k===c));
 document.getElementById('statusL').innerHTML=STATUSL[lens];
 renderAns();
 if(document.body.dataset.stage==='step1'){
  setStage('today');window.scrollTo({top:0,behavior:'smooth'});}
}
function setView(v){
 document.body.dataset.view=v;
 renderAns();
}
function setStage(s){
 document.body.dataset.stage=s;
 const b=document.getElementById('iwbtn');
 b.innerHTML = s==='full' ? '&#8593;&nbsp; Back to today &mdash; before Ironwood'
                          : 'What will change when Ironwood activates? &nbsp;&#8595;';
 b.classList.toggle('open',s==='full');
}
function toggleIW(){
 if(document.body.dataset.stage==='full'){setStage('today');}
 else{setStage('full');
  setTimeout(()=>document.getElementById('band').scrollIntoView({behavior:'smooth',block:'start'}),60);}
}
document.querySelectorAll('.cell').forEach(el=>
 el.onclick=()=>{const v=document.body.dataset.view;
  setView(v==='all'?el.dataset.col:'all');});
setView('all');setStage('step1');
</script>
</body>
</html>
